<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KalingaLink — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: { 50:'#fef7ee',100:'#fdecd3',500:'#e07a3b',600:'#c75f24',700:'#9c481b' },
      ink:   { 900:'#1a1a1a',700:'#3a3a3a',500:'#6b6b6b' } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-brand-50 text-ink-900 min-h-screen grid place-items-center px-4">
<div class="max-w-md w-full">
  <div class="text-center mb-6">
    <div class="inline-block h-12 w-12 rounded-full bg-brand-500 mb-2"></div>
    <h1 class="text-2xl font-bold">Welcome back</h1>
    <p class="text-ink-500 text-sm">Sign in to manage events, sign up for committees, or pledge supplies.</p>
  </div>

  <div class="rounded-2xl bg-white p-6 border border-brand-100 shadow-sm">
    <form class="space-y-3 text-sm">
      <div>
        <label class="font-medium">Email</label>
        <input type="email" class="w-full rounded-lg border border-brand-100 px-3 py-2" placeholder="you@uplb.edu.ph" />
      </div>
      <div>
        <label class="font-medium">Password</label>
        <input type="password" class="w-full rounded-lg border border-brand-100 px-3 py-2" placeholder="••••••••" />
      </div>
      <button class="w-full rounded-lg bg-brand-500 text-white py-2 font-medium">Sign in</button>
    </form>
    <div class="text-center text-sm mt-4 text-ink-500">
      No account? <a class="text-brand-600 hover:underline">Create one</a>
    </div>
  </div>

  <a href="01-home.html" class="block text-center text-sm text-ink-500 mt-4 hover:text-brand-600">← Back to home</a>
</div>
</body>
</html>
